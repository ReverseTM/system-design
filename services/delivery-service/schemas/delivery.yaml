components:
  schemas:
    Delivery:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        sender_id:
          type: integer
          format: int64
        recipient_id:
          type: integer
          format: int64
        package_id:
          type: string
        address:
          type: string
        status:
          type: string
        created_at:
          type: string
      required:
        - id
        - sender_id
        - recipient_id
        - package_id
        - address
        - status
        - created_at

    CreateDeliveryRequestBody:
      type: object
      additionalProperties: false
      properties:
        sender_id:
          type: integer
          format: int64
        recipient_id:
          type: integer
          format: int64
        package_id:
          type: string
        address:
          type: string
      required:
        - sender_id
        - recipient_id
        - package_id
        - address

    CreateDeliveryResponseBody:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string
          default: ""
      required:
        - id
        - message

    GetDeliveriesResponseBody:
      type: object
      additionalProperties: false
      properties:
        deliveries:
          type: array
          items:
            $ref: '#/components/schemas/Delivery'
      required:
        - deliveries
