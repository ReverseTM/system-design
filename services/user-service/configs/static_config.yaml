components_manager:
    task_processors:
        main-task-processor:
            worker_threads: $worker-threads

        fs-task-processor:
            worker_threads: $worker-fs-threads

    default_task_processor: main-task-processor

    coro_pool:
        stack_usage_monitor_enabled: false

    components:
        server:
            listener:
                port: $server-port
                task_processor: main-task-processor

        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: $logger-level
                    overflow_behavior: discard

        testsuite-support: {}

        dns-client:
            fs-task-processor: fs-task-processor

        default-secdist-provider:
            config: $secdist-path

        secdist: {}

        redis-cache:
            groups:
              - config_name: cache
                db: cache
            subscribe_groups: []
            thread_pools:
                redis_thread_pool_size: 4
                sentinel_thread_pool_size: 1

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        db-postgres:
            dbconnection: $dbconnection

        storage-user: {}

        usecase-user: {}

        handler-create-user:
            path: /v1/users
            method: POST
            task_processor: main-task-processor

        handler-get-user-by-id:
            path: /v1/users/{id}
            method: GET
            task_processor: main-task-processor

        handler-get-users:
            path: /v1/users
            method: GET
            task_processor: main-task-processor
