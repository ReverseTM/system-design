components:
  schemas:
    User:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        login:
          type: string
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        created_at:
          type: string
      required:
        - id
        - user_id
        - login
        - email
        - first_name
        - last_name
        - created_at

    CreateUserRequestBody:
      type: object
      additionalProperties: false
      properties:
        user_id:
          type: integer
          format: int64
        login:
          type: string
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
      required:
        - user_id
        - login
        - email
        - first_name
        - last_name

    CreateUserResponseBody:
      type: object
      additionalProperties: false
      properties:
        id:
          type: integer
          format: int64
        message:
          type: string
          default: ""
      required:
        - id
        - message

    GetUsersResponseBody:
      type: object
      additionalProperties: false
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'
      required:
        - users
