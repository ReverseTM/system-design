openapi: 3.0.3
info:
  title: Auth Service
  version: 1.0.0
  description: Registration, login and JWT token validation

servers:
  - url: http://localhost:8080
    description: nginx gateway

tags:
  - name: auth

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [login, password, email, first_name, last_name]
      properties:
        login:
          type: string
          example: alice
        password:
          type: string
          example: secret123
        email:
          type: string
          format: email
          example: alice@example.com
        first_name:
          type: string
          example: Alice
        last_name:
          type: string
          example: Smith

    RegisterResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        message:
          type: string
          example: User registered successfully

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          example: alice
        password:
          type: string
          example: secret123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    ValidateResponse:
      type: object
      properties:
        login:
          type: string
          example: alice
        issued_at:
          type: integer
          description: Unix timestamp
          example: 1774804680
        expires_at:
          type: integer
          description: Unix timestamp
          example: 1774808280

    Error:
      type: object
      properties:
        code:
          type: integer
          example: 401
        message:
          type: string
          example: Invalid credentials

paths:
  /v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              login: alice
              password: secret123
              email: alice@example.com
              first_name: Alice
              last_name: Smith
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
              example:
                id: 1
                message: User registered successfully
        '400':
          description: Missing or invalid fields
        '409':
          description: User with this login already exists

  /v1/auth/login:
    post:
      tags: [auth]
      summary: Log in and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              login: alice
              password: secret123
      responses:
        '200':
          description: JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '400':
          description: Missing fields
        '401':
          description: Invalid login or password

  /v1/auth/validate:
    get:
      tags: [auth]
      summary: Validate a JWT token
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
              example:
                login: alice
                issued_at: 1774804680
                expires_at: 1774808280
        '401':
          description: Missing, invalid or expired token
