openapi: 3.0.3
info:
  title: User Service
  version: 1.0.0
  description: User profile management

servers:
  - url: http://localhost:8080
    description: nginx gateway

tags:
  - name: users

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        login:
          type: string
          example: alice
        email:
          type: string
          example: alice@example.com
        first_name:
          type: string
          example: Alice
        last_name:
          type: string
          example: Smith
        created_at:
          type: string
          format: date-time
          example: "2026-03-29T17:17:34Z"

    CreateUserRequest:
      type: object
      required: [id, login, email, first_name, last_name]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        login:
          type: string
          example: alice
        email:
          type: string
          example: alice@example.com
        first_name:
          type: string
          example: Alice
        last_name:
          type: string
          example: Smith

    CreateUserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        message:
          type: string
          example: User created successfully

    GetUsersResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

paths:
  /v1/users:
    post:
      tags: [users]
      summary: Create a user (called internally by auth-service)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            example:
              id: 1
              login: alice
              email: alice@example.com
              first_name: Alice
              last_name: Smith
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
              example:
                id: 1
                message: User created successfully
        '400':
          description: Missing or invalid fields
        '409':
          description: User with this login, email or id already exists

    get:
      tags: [users]
      summary: Search users by login (exact) or name mask (prefix)
      security:
        - BearerAuth: []
      parameters:
        - name: login
          in: query
          description: Exact login to look up (mutually exclusive with mask)
          schema:
            type: string
          example: alice
        - name: mask
          in: query
          description: Prefix of "first_name last_name" to search (mutually exclusive with login)
          schema:
            type: string
          example: Ali
      responses:
        '200':
          description: List of matching users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUsersResponse'
              examples:
                by_login:
                  summary: Result for ?login=alice
                  value:
                    users:
                      - id: 1
                        login: alice
                        email: alice@example.com
                        first_name: Alice
                        last_name: Smith
                        created_at: "2026-03-29T17:17:34Z"
                by_mask:
                  summary: Result for ?mask=Ali
                  value:
                    users:
                      - id: 1
                        login: alice
                        email: alice@example.com
                        first_name: Alice
                        last_name: Smith
                        created_at: "2026-03-29T17:17:34Z"
        '400':
          description: Neither login nor mask provided
        '404':
          description: User not found (only for login lookup)

  /v1/users/{id}:
    get:
      tags: [users]
      summary: Get user by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                login: alice
                email: alice@example.com
                first_name: Alice
                last_name: Smith
                created_at: "2026-03-29T17:17:34Z"
        '400':
          description: id is not a valid integer
        '404':
          description: User not found