openapi: 3.0.3
info:
  title: Package Service
  version: 1.0.0
  description: Parcel/package management

servers:
  - url: http://localhost:8080
    description: nginx gateway

tags:
  - name: packages

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Package:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user_id:
          type: integer
          format: int64
          example: 1
        weight:
          type: number
          format: float
          example: 1.5
        length:
          type: number
          format: float
          example: 30.0
        width:
          type: number
          format: float
          example: 20.0
        height:
          type: number
          format: float
          example: 10.0
        description:
          type: string
          example: Books
        created_at:
          type: string
          format: date-time
          example: "2026-03-29T17:17:34Z"

    CreatePackageRequest:
      type: object
      required: [user_id, weight, length, width, height, description]
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        weight:
          type: number
          example: 1.5
        length:
          type: number
          example: 30.0
        width:
          type: number
          example: 20.0
        height:
          type: number
          example: 10.0
        description:
          type: string
          example: Books

    CreatePackageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        message:
          type: string
          example: Package created successfully

    GetPackagesResponse:
      type: object
      properties:
        packages:
          type: array
          items:
            $ref: '#/components/schemas/Package'

paths:
  /v1/packages:
    post:
      tags: [packages]
      summary: Create a new package
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePackageRequest'
            example:
              user_id: 1
              weight: 1.5
              length: 30.0
              width: 20.0
              height: 10.0
              description: Books
      responses:
        '201':
          description: Package created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePackageResponse'
              example:
                id: 1
                message: Package created successfully
        '400':
          description: Missing or invalid fields

    get:
      tags: [packages]
      summary: Get all packages for a user
      security:
        - BearerAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      responses:
        '200':
          description: List of packages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPackagesResponse'
              example:
                packages:
                  - id: 1
                    user_id: 1
                    weight: 1.5
                    length: 30.0
                    width: 20.0
                    height: 10.0
                    description: Books
                    created_at: "2026-03-29T17:17:34Z"
        '400':
          description: user_id missing or not a valid integer