events {
    worker_connections 1024;
}

http {
    upstream user_service {
        server user-service:8080;
    }

    upstream auth_service {
        server auth-service:8080;
    }

    upstream package_service {
        server package-service:8080;
    }

    upstream delivery_service {
        server delivery-service:8080;
    }

    upstream swagger_ui {
        server swagger-ui:8080;
    }

    server {
        listen 80;

        # ── Docs (Swagger UI) ──────────────────────────────────────────
        location /docs/ {
            proxy_pass http://swagger_ui;
        }

        # ── Public: auth ───────────────────────────────────────────────
        location = /v1/auth/register {
            proxy_pass http://auth_service;
        }

        location = /v1/auth/login {
            proxy_pass http://auth_service;
        }

        # ── Internal subrequest for JWT validation ─────────────────────
        location = /_validate {
            internal;
            proxy_pass http://auth_service/v1/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
        }

        # ── Protected: users ───────────────────────────────────────────
        location /v1/users {
            auth_request /_validate;
            error_page 401 = @unauthorized;
            proxy_pass http://user_service;
        }

        # ── Protected: packages ────────────────────────────────────────
        location /v1/packages {
            auth_request /_validate;
            error_page 401 = @unauthorized;
            proxy_pass http://package_service;
        }

        # ── Protected: deliveries ──────────────────────────────────────
        location /v1/deliveries {
            auth_request /_validate;
            error_page 401 = @unauthorized;
            proxy_pass http://delivery_service;
        }

        location @unauthorized {
            default_type application/json;
            return 401 '{"code":401,"message":"Unauthorized"}';
        }
    }
}
